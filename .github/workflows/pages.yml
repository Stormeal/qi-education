name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Test Angular app
        run: npm run app:test -- --run

      - name: Test API
        run: npm run api:test

      - name: Verify hosted auth API
        run: curl --fail --silent --show-error https://qi-education.vercel.app/api/health/auth

      - name: Verify hosted API config
        run: |
          node --input-type=module <<'NODE'
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          let lastError;

          for (let attempt = 1; attempt <= 12; attempt += 1) {
            try {
              const response = await fetch('https://qi-education.vercel.app/api/health/config');
              const body = await response.json();

              if (!response.ok) {
                throw new Error(`Hosted API config returned HTTP ${response.status}`);
              }

              if (!body.auth?.configured || body.auth?.storage !== 'google-sheets') {
                throw new Error('Hosted API must use configured Google Sheets auth storage before Pages deploys.');
              }

              process.exit(0);
            } catch (error) {
              lastError = error;
              console.log(`Hosted API config check attempt ${attempt} failed: ${error.message}`);
              if (attempt < 12) {
                await sleep(15000);
              }
            }
          }

          throw lastError;
          NODE

      - name: Build GitHub Pages bundle
        run: npm run app:build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/qi-education-app/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
