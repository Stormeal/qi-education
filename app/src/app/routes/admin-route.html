@if (state.isSessionRestoring()) {
  <app-session-restore-state />
} @else if (state.loginState()?.permissions?.hasAdminAccess) {
  <app-admin-page
    [appVersion]="state.appVersion"
    [currentYear]="state.currentYear"
    [student]="state.student()"
    [userEmail]="state.loginState()?.user?.email ?? ''"
    [userRoleLabel]="state.student().currentRole"
    [feedback]="state.adminFeedback()"
    [feedbackLoading]="state.adminFeedbackLoading()"
    [feedbackError]="state.adminFeedbackError()"
    [isFeedbackOpen]="state.isFeedbackOpen()"
    [feedbackSubmitted]="state.feedbackSubmitted()"
    [feedbackPage]="state.feedbackPage()"
    [feedbackRating]="state.feedbackRating()"
    [feedbackText]="state.feedbackText()"
    [feedbackSubmitting]="state.feedbackSubmitting()"
    [feedbackSubmitError]="state.feedbackError()"
    [feedbackOptions]="state.feedbackOptions"
    (homeClicked)="state.navigateHome()"
    (coursesClicked)="state.navigateCourses()"
    (libraryClicked)="state.navigateLibrary()"
    (feedbackOpened)="state.openFeedback()"
    (loggedOut)="state.logout()"
    (adminClicked)="state.navigateAdmin()"
    (feedbackReloaded)="state.reloadAdminFeedback()"
    (feedbackClosed)="state.closeFeedback()"
    (feedbackRatingSelected)="state.selectFeedbackRating($event)"
    (feedbackTextChanged)="state.updateFeedbackText($event)"
    (feedbackSubmittedClicked)="state.submitFeedback()"
    (feedbackTriaged)="state.updateAdminFeedbackTriage($event)"
  />
} @else if (state.loginState()) {
  <app-dashboard-page
    [appVersion]="state.appVersion"
    [currentYear]="state.currentYear"
    [student]="state.student()"
    [userEmail]="state.loginState()?.user?.email ?? ''"
    [userRoleLabel]="state.student().currentRole"
    [canAccessAdmin]="false"
    [activeCourse]="state.activeCourse()"
    [recommendedCourses]="state.recommendedCourses()"
    [nextActions]="state.nextActions()"
    [isFeedbackOpen]="state.isFeedbackOpen()"
    [feedbackSubmitted]="state.feedbackSubmitted()"
    [feedbackPage]="state.feedbackPage()"
    [feedbackRating]="state.feedbackRating()"
    [feedbackText]="state.feedbackText()"
    [feedbackSubmitting]="state.feedbackSubmitting()"
    [feedbackError]="state.feedbackError()"
    [feedbackOptions]="state.feedbackOptions"
    (homeClicked)="state.navigateHome()"
    (coursesClicked)="state.navigateCourses()"
    (libraryClicked)="state.navigateLibrary()"
    (feedbackOpened)="state.openFeedback()"
    (loggedOut)="state.logout()"
    (feedbackClosed)="state.closeFeedback()"
    (feedbackRatingSelected)="state.selectFeedbackRating($event)"
    (feedbackTextChanged)="state.updateFeedbackText($event)"
    (feedbackSubmittedClicked)="state.submitFeedback()"
    (adminClicked)="state.navigateAdmin()"
  />
} @else {
  <app-login-page
    [email]="state.email()"
    [password]="state.password()"
    [rememberMe]="state.rememberMe()"
    [passwordVisible]="state.passwordVisible()"
    [isSubmitting]="state.isSubmitting()"
    [loginError]="state.loginError()"
    [canSubmit]="state.canSubmit()"
    [learningHighlights]="state.learningHighlights"
    (emailChanged)="state.updateEmail($event)"
    (passwordChanged)="state.updatePassword($event)"
    (rememberMeToggled)="state.toggleRememberMe()"
    (passwordVisibilityToggled)="state.togglePasswordVisibility()"
    (loginSubmitted)="state.submitLogin()"
  />
}
