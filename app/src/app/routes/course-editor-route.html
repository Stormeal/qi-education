@if (state.isSessionRestoring()) {
  <app-session-restore-state />
} @else if (state.loginState()) {
  <app-course-editor-page
    [appVersion]="state.appVersion"
    [currentYear]="state.currentYear"
    [student]="state.student()"
    [userEmail]="state.loginState()?.user?.email ?? ''"
    [userRoleLabel]="state.student().currentRole"
    [canAccessAdmin]="state.loginState()?.permissions?.hasAdminAccess ?? false"
    [courseFormMode]="state.courseFormMode()"
    [courseDraft]="state.courseDraft()"
    [courseSubmitting]="state.courseSubmitting()"
    [courseCreateError]="state.courseCreateError()"
    [courseSaveNotice]="state.courseSaveNotice()"
    [courseContent]="state.courseContent()"
    [courseContentLoading]="state.courseContentLoading()"
    [courseContentSaving]="state.courseContentSaving()"
    [courseContentError]="state.courseContentError()"
    [isFeedbackOpen]="state.isFeedbackOpen()"
    [feedbackSubmitted]="state.feedbackSubmitted()"
    [feedbackPage]="state.feedbackPage()"
    [feedbackRating]="state.feedbackRating()"
    [feedbackText]="state.feedbackText()"
    [feedbackSubmitting]="state.feedbackSubmitting()"
    [feedbackError]="state.feedbackError()"
    [feedbackOptions]="state.feedbackOptions"
    (homeClicked)="state.navigateHome()"
    (coursesClicked)="state.navigateCourses()"
    (libraryClicked)="state.navigateLibrary()"
    (feedbackOpened)="state.openFeedback()"
    (loggedOut)="state.logout()"
    (adminClicked)="state.navigateAdmin()"
    (courseCanceled)="state.cancelCreateCourse()"
    (courseTitleChanged)="state.updateCourseTitle($event)"
    (courseDescriptionChanged)="state.updateCourseDescription($event)"
    (courseRequirementsChanged)="state.updateCourseRequirements($event)"
    (courseWhatYoullLearnChanged)="state.updateCourseWhatYoullLearn($event)"
    (courseAudienceChanged)="state.updateCourseAudience($event)"
    (courseLevelChanged)="state.updateCourseLevel($event)"
    (coursePartOfCareerChanged)="state.updateCoursePartOfCareer($event)"
    (courseTeacherChanged)="state.updateCourseTeacher($event)"
    (courseCareerGoalsChanged)="state.updateCourseCareerGoals($event)"
    (courseStatusChanged)="state.updateCourseStatus($event)"
    (courseSubmitted)="state.submitCourse()"
    (courseSectionAdded)="state.addCourseSection()"
    (courseSectionRemoved)="state.removeCourseSection($event)"
    (courseSectionTitleChanged)="state.updateCourseSectionTitle($event.sectionIndex, $event.value)"
    (courseComponentAdded)="state.addCourseComponent($event.sectionIndex, $event.type)"
    (courseComponentRemoved)="state.removeCourseComponent($event.sectionIndex, $event.componentIndex)"
    (courseComponentTitleChanged)="state.updateCourseComponentTitle($event.sectionIndex, $event.componentIndex, $event.value)"
    (courseComponentTypeChanged)="state.updateCourseComponentType($event.sectionIndex, $event.componentIndex, $event.value)"
    (courseComponentDurationChanged)="state.updateCourseComponentDuration($event.sectionIndex, $event.componentIndex, $event.value)"
    (courseComponentContentChanged)="state.updateCourseComponentContent($event.sectionIndex, $event.componentIndex, $event.value)"
    (courseComponentUrlChanged)="state.updateCourseComponentUrl($event.sectionIndex, $event.componentIndex, $event.value)"
    (courseComponentQuizQuestionChanged)="state.updateCourseComponentQuizQuestion($event.sectionIndex, $event.componentIndex, $event.questionIndex, $event.value)"
    (courseComponentQuizPointsChanged)="state.updateCourseComponentQuizPoints($event.sectionIndex, $event.componentIndex, $event.questionIndex, $event.value)"
    (courseComponentQuizPassPointsChanged)="state.updateCourseComponentQuizPassPoints($event.sectionIndex, $event.componentIndex, $event.value)"
    (courseComponentQuizQuestionAdded)="state.addCourseComponentQuizQuestion($event.sectionIndex, $event.componentIndex)"
    (courseComponentQuizQuestionRemoved)="state.removeCourseComponentQuizQuestion($event.sectionIndex, $event.componentIndex, $event.questionIndex)"
    (courseComponentQuizAnswerTextChanged)="state.updateCourseComponentQuizAnswerText($event.sectionIndex, $event.componentIndex, $event.questionIndex, $event.answerIndex, $event.value)"
    (courseComponentQuizAnswerDescriptionChanged)="state.updateCourseComponentQuizAnswerDescription($event.sectionIndex, $event.componentIndex, $event.questionIndex, $event.answerIndex, $event.value)"
    (courseComponentQuizAnswerCorrectChanged)="state.updateCourseComponentQuizAnswerCorrect($event.sectionIndex, $event.componentIndex, $event.questionIndex, $event.answerIndex, $event.value)"
    (courseComponentMoved)="state.moveCourseComponent($event.sectionIndex, $event.fromIndex, $event.toIndex)"
    (feedbackClosed)="state.closeFeedback()"
    (feedbackRatingSelected)="state.selectFeedbackRating($event)"
    (feedbackTextChanged)="state.updateFeedbackText($event)"
    (feedbackSubmittedClicked)="state.submitFeedback()"
  />
} @else {
  <app-login-page
    [email]="state.email()"
    [password]="state.password()"
    [rememberMe]="state.rememberMe()"
    [passwordVisible]="state.passwordVisible()"
    [isSubmitting]="state.isSubmitting()"
    [loginError]="state.loginError()"
    [canSubmit]="state.canSubmit()"
    [learningHighlights]="state.learningHighlights"
    (emailChanged)="state.updateEmail($event)"
    (passwordChanged)="state.updatePassword($event)"
    (rememberMeToggled)="state.toggleRememberMe()"
    (passwordVisibilityToggled)="state.togglePasswordVisibility()"
    (loginSubmitted)="state.submitLogin()"
  />
}
