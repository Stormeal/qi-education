@if (loginState()) {
  <app-dashboard-page
    [appVersion]="appVersion"
    [currentYear]="currentYear"
    [student]="student()"
    [userEmail]="loginState()?.user?.email ?? ''"
    [userRoleLabel]="student().currentRole"
    [activeCourse]="activeCourse()"
    [recommendedCourses]="recommendedCourses()"
    [nextActions]="nextActions()"
    [isFeedbackOpen]="isFeedbackOpen()"
    [feedbackSubmitted]="feedbackSubmitted()"
    [feedbackPage]="feedbackPage()"
    [feedbackRating]="feedbackRating()"
    [feedbackText]="feedbackText()"
    [feedbackSubmitting]="feedbackSubmitting()"
    [feedbackError]="feedbackError()"
    [feedbackOptions]="feedbackOptions"
    (feedbackOpened)="openFeedback()"
    (loggedOut)="logout()"
    (feedbackClosed)="closeFeedback()"
    (feedbackRatingSelected)="selectFeedbackRating($event)"
    (feedbackTextChanged)="updateFeedbackText($event)"
    (feedbackSubmittedClicked)="submitFeedback()"
  />
} @else {
  <app-login-page
    [email]="email()"
    [password]="password()"
    [rememberMe]="rememberMe()"
    [passwordVisible]="passwordVisible()"
    [isSubmitting]="isSubmitting()"
    [loginError]="loginError()"
    [canSubmit]="canSubmit()"
    [learningHighlights]="learningHighlights"
    (emailChanged)="updateEmail($event)"
    (passwordChanged)="updatePassword($event)"
    (rememberMeToggled)="toggleRememberMe()"
    (passwordVisibilityToggled)="togglePasswordVisibility()"
    (loginSubmitted)="submitLogin()"
  />
}
