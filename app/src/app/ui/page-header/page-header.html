<nav class="topbar" aria-label="Primary navigation">
  <app-brand-link />
  <app-button (buttonClicked)="feedbackOpened.emit()">Feedback</app-button>
  <div class="tabs" aria-label="Site sections">
    <button
      type="button"
      class="tab-link"
      [class.active]="activeSection() === 'home'"
      (click)="homeClicked.emit()"
    >
      Home
    </button>
    <a [href]="aboutHref()">About</a>
    <button
      type="button"
      class="tab-link with-chevron"
      [class.active]="activeSection() === 'courses'"
      (click)="coursesClicked.emit()"
    >
      Courses
      <span class="nav-chevron" aria-hidden="true"></span>
    </button>
    <button
      type="button"
      class="tab-link with-chevron"
      [class.active]="activeSection() === 'library'"
      (click)="libraryClicked.emit()"
    >
      Library
      <span class="nav-chevron" aria-hidden="true"></span>
    </button>
  </div>
  <app-profile-menu
    [displayName]="displayName()"
    [email]="email()"
    [roleLabel]="roleLabel()"
    [canAccessAdmin]="canAccessAdmin()"
    (loggedOut)="loggedOut.emit()"
    (adminSelected)="adminClicked.emit()"
  />
</nav>
