>
  <svg class="brand-mark" viewBox="0 0 72 54" aria-hidden="true" focusable="false">
    <path class="brand-line" d="M10 12h23l3 6 3-6h23v33H40l-4 4-4-4H10V12Z" />

  </svg>
  <span>{{ label() }}</span>
</a>
