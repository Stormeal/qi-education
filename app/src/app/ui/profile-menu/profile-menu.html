<div class="profile-menu">
  <button
    type="button"
    class="profile-trigger"
    aria-haspopup="menu"
    [attr.aria-expanded]="isOpen()"
    aria-label="Open profile menu"
    (click)="toggleMenu()"
  >
    <span class="profile-avatar" aria-hidden="true">{{ initials() || 'U' }}</span>
  </button>

  @if (isOpen()) {
    <div class="profile-dropdown" role="menu" aria-label="Profile menu">
      <div class="profile-summary">
        <span class="profile-summary-avatar" aria-hidden="true">{{ initials() || 'U' }}</span>
        <div>
          <strong>{{ displayName() }}</strong>
          <span>{{ email() }}</span>
          <small>{{ roleLabel() }}</small>
        </div>
      </div>

      <button type="button" role="menuitem" class="profile-menu-item" (click)="selectProfile()">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M10 10.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
          <path d="M4 17a6 6 0 0 1 12 0" />
        </svg>
        Profile
      </button>
      <button type="button" role="menuitem" class="profile-menu-item" (click)="selectSettings()">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M10 7.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6Z" />
          <path
            d="M16.4 10a6.4 6.4 0 0 0-.1-1l1.4-1.1-1.5-2.6-1.7.7a7 7 0 0 0-1.7-1l-.3-1.8h-3l-.3 1.8a7 7 0 0 0-1.7 1l-1.7-.7-1.5 2.6L5.7 9a6.4 6.4 0 0 0 0 2l-1.4 1.1 1.5 2.6 1.7-.7a7 7 0 0 0 1.7 1l.3 1.8h3l.3-1.8a7 7 0 0 0 1.7-1l1.7.7 1.5-2.6-1.4-1.1c.1-.3.1-.7.1-1Z"
          />
        </svg>
        Settings
      </button>
      @if (canAccessAdmin()) {
        <button type="button" role="menuitem" class="profile-menu-item" (click)="selectAdmin()">
          <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path d="M4 5.5h12" />
            <path d="M5.5 5.5v9a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-9" />
            <path d="M7.5 9h5" />
            <path d="M7.5 12h3" />
          </svg>
          Admin
        </button>
      }
      <button type="button" role="menuitem" class="profile-menu-item danger" (click)="logout()">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M8 4H4v12h4" />
          <path d="M11 6l4 4-4 4" />
          <path d="M6 10h9" />
        </svg>
        Logout
      </button>
    </div>
  }
</div>
